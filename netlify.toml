[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[[edge_functions]]
  path = "/api/chat"
  function = "chat"

[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200
  force = false

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
